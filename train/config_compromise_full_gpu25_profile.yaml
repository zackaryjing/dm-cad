# Dual-Modal CAD Generator profiling config
# 基于 config_compromise_full_gpu25.yaml
# 目的：在 GPU 2 和 GPU 5 上做短程 timing breakdown，对瓶颈进行定位

model:
  embed_dim: 512
  n_heads: 8
  n_layers: 6
  max_seq_len: 120
  n_views: 8
  fusion_type: gating
  freeze_vit: true

training:
  batch_size: 128
  num_epochs: 1
  lr: 2.0e-05
  weight_decay: 0.01
  warmup_epochs: 5
  gradient_clip: 0.5
  num_workers: 24
  use_amp: true
  max_train_batches: 40
  max_val_batches: 10
  profile_timing: true
  profile_warmup_steps: 5
  profile_steps: 20

loss:
  cmd_weight: 1.0
  eos_weight: 0.6
  param_weight: 0.35
  use_cmd_mask: true
  eos_token_id: 3
  label_smoothing: 0.05
  class_weights: [1.0, 1.1, 1.0, 1.6, 1.3, 1.15]
  param_scale: 1.0
  param_curriculum_start: 0.15
  param_curriculum_end: 0.65
  param_loss_cap: 1.0

optimizer:
  type: AdamW
  lr: 2.0e-05
  weight_decay: 0.01

scheduler:
  type: CosineAnnealingLR
  T_max: 200
  eta_min: 5.0e-07

data:
  img_size: 224
  text_max_len: 64
  data_root: datasets/dataset_v0
  train_ids_file: train_ids.txt
  test_ids_file: test_ids.txt
  backend: lmdb
  lmdb_path: cad_data.lmdb
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 1
  max_prefetch_gb: 16.0

log:
  log_dir: ./runs/dmcad
  print_freq: 10
  val_freq: 1

device:
  type: cuda
  visible_devices: [2,5]
  use_data_parallel: true
  output_device: 0
