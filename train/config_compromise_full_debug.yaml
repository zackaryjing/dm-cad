# Dual-Modal CAD Generator debug config
# 目的：从塌缩前 checkpoint 恢复，观察 epoch 10-20 区间的 step-level 调试信号

model:
  embed_dim: 512
  n_heads: 8
  n_layers: 6
  max_seq_len: 120
  n_views: 8
  fusion_type: gating
  freeze_vit: true

training:
  batch_size: 128
  num_epochs: 20
  progress_total_epochs: 200
  lr: 2.0e-05
  weight_decay: 0.01
  warmup_epochs: 5
  gradient_clip: 0.5
  num_workers: 24
  use_amp: true
  debug_monitor_enabled: true
  debug_log_every_batches: 50

loss:
  cmd_weight: 0.5
  param_weight: 0.5
  use_cmd_mask: true
  label_smoothing: 0.05
  class_weights: [1.0, 1.1, 1.0, 1.6, 1.3, 1.15]
  n_param_bins: 256

optimizer:
  type: AdamW
  lr: 2.0e-05
  weight_decay: 0.01

scheduler:
  type: CosineAnnealingLR
  T_max: 200
  eta_min: 5.0e-07

data:
  img_size: 224
  text_max_len: 64
  data_root: datasets/dataset_v0
  train_ids_file: train_ids.txt
  test_ids_file: test_ids.txt
  backend: lmdb
  lmdb_path: cad_data.lmdb
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 1
  max_prefetch_gb: 16.0

log:
  log_dir: ./runs/dmcad
  print_freq: 10
  val_freq: 1

device:
  type: cuda
  visible_devices: [3,4]
  use_data_parallel: true
  output_device: 0
