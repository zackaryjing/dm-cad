# Dual-Modal CAD Generator 配置文件
# 基于设计文档附录 A

model:
  embed_dim: 512
  n_heads: 8
  n_layers: 6
  max_seq_len: 120
  n_views: 8
  fusion_type: gating  # concat, cross_attention, gating
  freeze_vit: true

training:
  batch_size: 32
  num_epochs: 80
  lr: 5.0e-05
  weight_decay: 0.01
  warmup_epochs: 5
  gradient_clip: 1.0
  num_workers: 4
  use_amp: true

loss:
  cmd_weight: 1.0
  param_weight: 0.5

optimizer:
  type: AdamW
  lr: 5.0e-05
  weight_decay: 0.01

scheduler:
  type: CosineAnnealingLR
  T_max: 80
  eta_min: 1.0e-06

data:
  img_size: 224
  text_max_len: 64
  data_root: datasets/dataset_v1
  train_ids_file: train_ids_5k.txt
  test_ids_file: test_ids_5k.txt

log:
  log_dir: ./runs/dmcad
  print_freq: 10
  val_freq: 1

device:
  type: cuda
  visible_devices: [0]
  use_data_parallel: false
  output_device: 0
