# Dual-Modal CAD Generator 配置文件
# 架构实验：视图级 memory + 多级条件注入

model:
  embed_dim: 512
  n_heads: 8
  n_layers: 6
  max_seq_len: 120
  n_views: 8
  fusion_type: gating  # concat, cross_attention, gating
  freeze_vit: true
  visual_memory_mode: view_tokens  # global_only, view_tokens
  use_global_fused_condition: true
  decoder_condition_injection: film_residual
  decoder_condition_hidden_dim: 512
  decoder_condition_scale: 1.0

training:
  batch_size: 256
  num_epochs: 500
  epoch_offset: 0
  warmup_epochs: 5
  gradient_clip: 0.5
  train_num_workers: 18
  val_num_workers: 12
  precision: bf16
  debug_monitor_enabled: false
  debug_log_every_batches: 10
  debug_fail_on_nonfinite: false

loss:
  cmd_weight: 0.5
  param_weight: 0.5
  use_cmd_mask: true
  label_smoothing: 0.05
  class_weights: [1.0, 1.1, 1.0, 1.6, 1.3, 1.15]
  n_param_bins: 256

optimizer:
  type: AdamW
  lr: 2.0e-05
  weight_decay: 0.01

scheduler:
  type: CosineAnnealingLR
  T_max: 200
  eta_min: 5.0e-07

data:
  img_size: 224
  text_max_len: 64
  data_root: datasets/dataset_v0
  train_ids_file: train_ids.txt
  test_ids_file: test_ids.txt
  backend: lmdb
  lmdb_path: cad_data.lmdb
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 1
  max_prefetch_gb: 48.0

log:
  log_dir: ./runs/dmcad
  print_freq: 10
  val_freq: 1

device:
  type: cuda
  visible_devices: [1,2]
