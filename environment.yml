channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - git

  # scientific stack
  - numpy=1.26.4
  - scipy
  - pandas
  - matplotlib
  - scikit-learn
  - tqdm
  - pillow

  # pytorch + cuda
  - pytorch=2.1.2
  - torchvision=0.16.2
  - torchaudio=2.1.2
  - pytorch-cuda=11.8

  # useful utilities
  - ipython
  - jupyterlab

  - pip:
      # huggingface stack
      - transformers==4.38.2
      - accelerate==0.27.2
      - datasets
      - peft

      # vision models
      - timm==0.9.12
      - einops

      # logging
      - tensorboard
      - wandb

      # geometry / CAD utils
      - trimesh
      - opencv-python
